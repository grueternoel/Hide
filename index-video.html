<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Hide - Archive & Display</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Source+Code+Pro:wght@300&display=swap');

        :root {
            /* Gallery Variables */
            --bg-color: #ffffff;
            --grid-gap: 5px;
            --zoom-scale: 11.0;
            --transition-speed: 0.15s;
            --num-cols: 5;

            /* Video Display Variables */
            --screen-width: 100%;
            --screen-height: 100dvh;
            --video-count: 3;
            --video-height: calc(var(--screen-height) / var(--video-count));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
            margin: 0 auto;
            position: relative;
            transition: background-color 0.3s ease;
        }

        /* View-specific body states */
        html {
            width: 100%;
            min-height: 100%;
        }

        body.video-mode {
            background: #000;
            height: 100dvh;
            min-height: -webkit-fill-available;
            overflow: hidden;
        }

        /* Navigation Button */
        .nav-button {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            padding: 10px 0;
            background: transparent;
            color: #000;
            text-decoration: none;
            font-family: 'Source Code Pro', monospace;
            font-weight: 300;
            font-size: 13px;
            letter-spacing: -0.2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            text-transform: none;
        }

        body.video-mode .nav-button {
            top: 40px;
            color: #fff;
            font-size: 14px;
        }

        .nav-button:hover {
            transform: translateX(-50%) translateY(-2px) scale(1.05);
            opacity: 0.7;
        }

        .nav-button:active {
            transform: translateX(-50%) translateY(0) scale(0.98);
        }

        /* Section Visibility */
        #archive-view,
        #video-view {
            width: 100%;
            transition: opacity 0.3s ease;
        }

        #archive-view {
            margin-top: 50px;
        }

        .hidden {
            display: none !important;
        }

        /* --- Archive View Styles --- */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(var(--num-cols), 1fr);
            gap: var(--grid-gap);
            width: 100%;
            margin: 0 auto;
            padding: 0 5vw 50px 5vw;
        }

        .image-wrapper {
            position: relative;
            aspect-ratio: 1 / 1;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .trigger {
            position: absolute;
            width: 43%;
            height: 43%;
            z-index: 10;
            pointer-events: auto;
            cursor: pointer;
        }

        .media-content {
            width: 43%;
            height: 43%;
            object-fit: cover;
            transition: transform var(--transition-speed) linear,
                box-shadow var(--transition-speed) linear,
                opacity var(--transition-speed) linear;
            border-radius: 0px;
            will-change: transform;
            pointer-events: none;
            position: absolute;
        }

        img.media-content {
            opacity: 1;
            z-index: 1;
        }

        video.media-content {
            opacity: 0;
            z-index: 2;
        }

        .image-wrapper:has(.trigger:hover) {
            z-index: 100;
        }

        .trigger:hover~img.media-content {
            transform: scale(var(--zoom-scale)) translate(var(--shift-x, 0), var(--shift-y, 0));
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.3);
        }

        .image-wrapper:has(video) .trigger:hover~video.media-content {
            opacity: 1;
            transform: scale(var(--zoom-scale)) translate(var(--shift-x, 0), var(--shift-y, 0));
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.5);
        }

        .image-wrapper:has(video) .trigger:hover~img.media-content {
            opacity: 0;
        }

        /* Mobile: Videos immer sichtbar (statt bei Hover) */
        @media (max-width: 767px) {
            video.media-content {
                opacity: 1 !important;
            }
        }

        /* --- Video View Styles --- */
        #video-view {
            position: fixed;
            top: calc(-1 * env(safe-area-inset-top, 0px));
            right: 0;
            bottom: calc(-1 * env(safe-area-inset-bottom, 0px));
            left: 0;
            display: flex;
            width: 100vw;
            height: auto;
            min-height: calc(
                100dvh +
                env(safe-area-inset-top, 0px) +
                env(safe-area-inset-bottom, 0px)
            );
            background: #000;
            overflow: hidden;
        }

        .full-video-container {
            position: relative;
            background: #000;
            overflow: hidden;
            flex: 1;
        }

        .full-video-container video {
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
        }

        .full-video-container .video-poster {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
            z-index: 2;
            pointer-events: none;
            opacity: 1;
        }

        .full-video-container video {
            position: relative;
            z-index: 1;
        }

        .full-video-container.is-playing .video-poster {
            opacity: 0;
        }

        /* Portrait: 3 Videos stapeln (vertikal) */
        @media (max-aspect-ratio: 1/1) {
            #video-view {
                flex-direction: column;
            }

            .full-video-container:nth-child(3) {
                display: block;
            }

            .full-video-container:nth-child(4) {
                display: none;
            }
        }

        /* Landscape: 2 Videos übereinander mit flexbox (zufällige Höhe via JS) */
        @media (min-aspect-ratio: 1/1) {
            #video-view {
                flex-direction: column;
            }

            .full-video-container:nth-child(3) {
                display: none;
            }

            .full-video-container:nth-child(4) {
                display: none;
            }
        }

        /* --- Responsive Design --- */
        /* Laptop (1200px and above) - dynamisch viele Spalten */
        @media (min-width: 1200px) {
            :root {
                --zoom-scale: 11.0;
            }
            
            .gallery-container {
                max-width: 100%;
                padding: 0 10px 50px 10px;
            }
        }

        /* Tablet/iPad (768px - 1199px) - 3 columns */
        @media (min-width: 768px) and (max-width: 1199px) {
            :root {
                --num-cols: 3;
                --zoom-scale: 6.5;
            }
            
            .gallery-container {
                max-width: 100%;
                padding: 0 3vw 40px 3vw;
            }
        }

        /* Mobile (below 768px) - 1 column mit grösseren Bildern */
        @media (max-width: 767px) {
            :root {
                --num-cols: 1;
                --zoom-scale: 3.0;
                --grid-gap: 1px;
            }
            
            .gallery-container {
                max-width: 100%;
                padding: 0 2vw 30px 2vw;
            }

            .trigger {
                width: 75%;
                height: 75%;
                pointer-events: none;
            }

            .media-content {
                width: 75%;
                height: 75%;
            }

            .nav-button {
                font-size: 11px;
                top: 15px;
            }

            body.video-mode .nav-button {
                font-size: 12px;
                top: 20px;
            }
        }
    </style>
</head>

            "hide_19.1.mp4", "hide_27.1.mp4", "hide_27.2.mp4", "hide_30.2.mp4", "hide_31.1.mp4",
            "hide_37.1.mp4", "hide_39.2.mp4", "hide_40.1.mp4", "hide_47.1.mp4", "hide_48.1.mp4",
            "hide_50.1.mp4", "hide_50.2.mp4", "hide_51.2.mp4", "hide_52.1.mp4", "hide_55.2.mp4",
            "hide_58.2.mp4", "hide_61.2.mp4", "hide_66.1.mp4", "hide_67.2.mp4", "hide_71.2.mp4",
            "hide_74.1.mp4", "hide_78.2.mp4", "hide_79.1.mp4", "hide_80.1.mp4", "hide_82.2.mp4"

        const fullVideoFiles = [
            "hide_12.2.mp4", "hide_16.2.mp4", "hide_19.1.mp4", "hide_27.1.mp4",
            "hide_27.2.mp4", "hide_3.2.mp4", "hide_30.2.mp4", "hide_31.1.mp4",
            "hide_37.1.mp4", "hide_39.2.mp4", "hide_4.1.mp4", "hide_40.1.mp4",
            "hide_47.1.mp4", "hide_48.1.mp4", "hide_50.1.mp4", "hide_50.2.mp4",
            "hide_51.2.mp4", "hide_52.1.mp4", "hide_55.2.mp4", "hide_58.2.mp4",
            "hide_61.2.mp4", "hide_66.1.mp4", "hide_67.2.mp4", "hide_71.2.mp4",
            "hide_74.1.mp4", "hide_78.2.mp4", "hide_79.1.mp4", "hide_80.1.mp4",
            "hide_82.2.mp4", "hide_9.1.mp4"
        ];

        // --- Archive logic ---
        const gallery = document.getElementById('gallery');
        const galleryVideoSet = new Set(galleryVideoFiles.map(v => v.replace('.mp4', '')));
        
        function getResponsiveCols() {
            const width = window.innerWidth;
            if (width < 768) return 1;
            if (width < 1200) return 3;
            
            // Desktop: dynamisch berechnen basierend auf verfügbarer Breite
            // Mindestbreite pro Zelle: 180px (mit Gap und Padding)
            const minCellWidth = 180;
            const padding = 20; // links und rechts zusammen
            const availableWidth = width - padding;
            const numCols = Math.max(5, Math.floor(availableWidth / minCellWidth));
            return numCols;
        }

        function getResponsiveZoomScale() {
            const width = window.innerWidth;
            if (width < 768) return 3.0;
            if (width < 1200) return 6.5;
            // Desktop: etwas kleinerer Zoom für mehr Spalten
            return Math.max(8.5, Math.min(11.0, 11.0 - (getResponsiveCols() - 5) * 0.15));
        }

        function calculateShifts(colIndex, rowIndex, numRows, numCols, baseSize, zoomScale) {
            const gallerContainer = document.querySelector('.gallery-container');
            const containerWidth = gallerContainer.offsetWidth;
            const cellSize = containerWidth / numCols;
            const margin = 15;
            
            const centerX = (colIndex + 0.5) * cellSize;
            const zoomedSize = baseSize * zoomScale;
            const leftEdge = centerX - zoomedSize / 2;
            const rightEdge = centerX + zoomedSize / 2;

            let pixelShiftX = 0;
            if (leftEdge < margin) {
                pixelShiftX = margin - leftEdge;
            } else if (rightEdge > containerWidth - margin) {
                pixelShiftX = (containerWidth - margin) - rightEdge;
            }

            let pixelShiftY = 0;
            const centerY = (rowIndex + 0.5) * cellSize;
            const containerHeight = numRows * cellSize;
            const topEdge = centerY - zoomedSize / 2;
            const bottomEdge = centerY + zoomedSize / 2;

            if (topEdge < margin) {
                pixelShiftY = margin - topEdge;
            } else if (bottomEdge > containerHeight - margin) {
                pixelShiftY = (containerHeight - margin) - bottomEdge;
            }

            return {
                shiftX: (pixelShiftX / (baseSize * zoomScale) * 100).toFixed(4),
                shiftY: (pixelShiftY / (baseSize * zoomScale) * 100).toFixed(4)
            };
        }

        let galleryMediaObserver = null;

        function renderGallery() {
            if (galleryMediaObserver) {
                galleryMediaObserver.disconnect();
            }

            gallery.innerHTML = '';
            const numCols = getResponsiveCols();
            const zoomScale = getResponsiveZoomScale();
            const isMobile = window.innerWidth < 768;

            document.documentElement.style.setProperty('--num-cols', numCols);
            document.documentElement.style.setProperty('--zoom-scale', zoomScale);

            const numRows = Math.ceil(galleryImageFiles.length / numCols);

            // Videos are loaded only shortly before they enter the viewport.
            // This avoids downloading/decoding all 30 videos at once on mobile.
            galleryMediaObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video.media-content');
                    if (!video) return;

                    if (entry.isIntersecting) {
                        if (!video.src) {
                            video.src = video.dataset.src;
                            video.load();
                        }

                        if (isMobile && !isVideoMode) {
                            video.muted = !(soundEnabled && video.dataset.name !== 'hide_67.2');
                            video.play().catch(() => {
                                video.muted = true;
                                video.play().catch(() => {});
                            });
                        }
                    } else {
                        video.pause();
                        video.muted = true;

                        // On mobile, release videos far outside the viewport.
                        // The poster image remains visible while scrolling.
                        if (isMobile && entry.boundingClientRect.bottom < -window.innerHeight * 1.5) {
                            video.removeAttribute('src');
                            video.load();
                        }
                    }
                });
            }, {
                root: null,
                rootMargin: isMobile ? '120% 0px 120% 0px' : '40% 0px 40% 0px',
                threshold: 0.01
            });

            galleryImageFiles.forEach((imgFileName, index) => {
                const baseName = imgFileName.replace('.png', '');
                const hasVideo = galleryVideoSet.has(baseName);

                const colIndex = index % numCols;
                const rowIndex = Math.floor(index / numCols);

                const galleryContainer = document.querySelector('.gallery-container');
                const containerWidth = galleryContainer ? galleryContainer.offsetWidth : window.innerWidth * 0.9;
                const cellSize = containerWidth / numCols;
                const baseSize = cellSize * 0.36;

                const shifts = calculateShifts(colIndex, rowIndex, numRows, numCols, baseSize, zoomScale);

                const wrapper = document.createElement('div');
                wrapper.className = 'image-wrapper';
                wrapper.style.setProperty('--shift-x', shifts.shiftX + '%');
                wrapper.style.setProperty('--shift-y', shifts.shiftY + '%');

                const trigger = document.createElement('div');
                trigger.className = 'trigger';
                wrapper.appendChild(trigger);

                // Always keep the still image as a lightweight poster/fallback.
                const img = document.createElement('img');
                img.className = 'media-content';
                img.src = `hide_web_bilderfinal/${imgFileName}`;
                img.alt = baseName;
                img.loading = 'lazy';
                img.decoding = 'async';
                wrapper.appendChild(img);

                if (hasVideo) {
                    const video = document.createElement('video');
                    video.className = 'media-content';
                    video.dataset.src = `hide_web_videosfinal/${baseName}.mp4`;
                    video.dataset.name = baseName;
                    video.loop = true;
                    video.muted = true;
                    video.defaultMuted = true;
                    video.playsInline = true;
                    video.setAttribute('playsinline', '');
                    video.setAttribute('webkit-playsinline', '');
                    video.preload = 'none';
                    video.poster = `hide_web_bilderfinal/${imgFileName}`;
                    wrapper.appendChild(video);

                    if (!isMobile) {
                        trigger.addEventListener('mouseenter', () => {
                            if (!video.src) {
                                video.src = video.dataset.src;
                                video.load();
                            }
                            video.muted = !(soundEnabled && baseName !== 'hide_67.2');
                            video.play().catch(() => {});
                        });

                        trigger.addEventListener('mouseleave', () => {
                            video.pause();
                            video.currentTime = 0;
                            video.muted = true;
                        });
                    }

                    galleryMediaObserver.observe(wrapper);
                }

                gallery.appendChild(wrapper);
            });
        }

        // Initial render
        renderGallery();

        // Re-render on window resize (with debounce)
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                renderGallery();
                // Auch zufällige Höhen recalculieren wenn im Video Display
                if (isVideoMode) {
                    calculateRandomHeights();
                }
            }, 250);
        });

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                if (isVideoMode) calculateRandomHeights();
            });
        }

        // --- Video Display logic ---
        const folderPath = "hide_web_videosfinal/";
        const posterFolderPath = "hide_web_bilderfinal/";

        function getPosterSrc(videoSrc) {
            const fileName = videoSrc.split('/').pop().replace('.mp4', '.png');
            return posterFolderPath + fileName;
        }

        function showVideoPoster(videoElement, videoSrc) {
            const container = videoElement.parentElement;
            const poster = container.querySelector('.video-poster');
            const posterSrc = getPosterSrc(videoSrc);

            container.classList.remove('is-playing');
            poster.src = posterSrc;
            videoElement.poster = posterSrc;
        }

        function hideVideoPoster(videoElement) {
            videoElement.parentElement.classList.add('is-playing');
        }
        const displayVideos = [
            document.getElementById('video-1'),
            document.getElementById('video-2'),
            document.getElementById('video-3'),
            document.getElementById('video-4')
        ];

        // Funktion für zufällige Höhenverteilung (vor Events definieren)
        function calculateRandomHeights() {
            const viewportHeight = window.visualViewport?.height || window.innerHeight;
            const isLandscape = window.innerWidth >= window.innerHeight;
            
            if (isLandscape && displayVideos[0] && displayVideos[1]) {
                // Zufällige Höhenverteilung für Landscape (2 Videos)
                const ratio = 0.3 + Math.random() * 0.4; // 30-70%
                const height1 = Math.floor(viewportHeight * ratio);
                const height2 = viewportHeight - height1;
                
                displayVideos[0].parentElement.style.flex = '0 0 ' + height1 + 'px';
                displayVideos[1].parentElement.style.flex = '0 0 ' + height2 + 'px';
            } else if (displayVideos[0] && displayVideos[1] && displayVideos[2]) {
                // Portrait: gleichmäßige Verteilung (3 Videos)
                displayVideos[0].parentElement.style.flex = '1';
                displayVideos[1].parentElement.style.flex = '1';
                displayVideos[2].parentElement.style.flex = '1';
            }
        }

        function getRandomVideo(excludeSrc) {
            let nextSrc;
            do {
                const index = Math.floor(Math.random() * fullVideoFiles.length);
                nextSrc = folderPath + fullVideoFiles[index];
            } while (nextSrc === excludeSrc && fullVideoFiles.length > 1);
            return nextSrc;
        }

        let displayInitialized = false;

        function playNewDisplayVideo(videoElement, initialStartTime = null, retryCount = 0) {
            const nextSrc = getRandomVideo(videoElement.currentSrc || videoElement.src);

            // Show the matching still image immediately, before the MP4 begins loading.
            showVideoPoster(videoElement, nextSrc);

            videoElement.pause();
            videoElement.removeAttribute('src');
            videoElement.load();

            const onMetadata = () => {
                if (initialStartTime !== null && Number.isFinite(videoElement.duration)) {
                    videoElement.currentTime = Math.min(
                        initialStartTime,
                        Math.max(0, videoElement.duration - 0.1)
                    );
                }
            };

            const startPlayback = () => {
                const isSpecificallyMuted = nextSrc.includes("hide_67.2.mp4");
                videoElement.muted = isSpecificallyMuted || !soundEnabled;

                videoElement.play().catch(() => {
                    videoElement.muted = true;
                    videoElement.play().catch(() => {});
                });
            };

            videoElement.addEventListener('loadedmetadata', onMetadata, { once: true });
            videoElement.addEventListener('canplay', startPlayback, { once: true });

            // Keep the poster visible until the video is genuinely rendering.
            videoElement.addEventListener('playing', () => {
                hideVideoPoster(videoElement);
            }, { once: true });

            videoElement.addEventListener('waiting', () => {
                showVideoPoster(videoElement, nextSrc);
            });

            videoElement.addEventListener('stalled', () => {
                showVideoPoster(videoElement, nextSrc);
            });

            videoElement.addEventListener('error', () => {
                showVideoPoster(videoElement, nextSrc);

                if (retryCount < 2) {
                    setTimeout(
                        () => playNewDisplayVideo(videoElement, null, retryCount + 1),
                        400
                    );
                }
            }, { once: true });

            videoElement.src = nextSrc;
            videoElement.load();
        }

        function initializeDisplayVideos() {
            if (displayInitialized) return;
            displayInitialized = true;

            playNewDisplayVideo(displayVideos[0], 2.66);
            playNewDisplayVideo(displayVideos[1], 0);
            playNewDisplayVideo(displayVideos[2], 5.33);
            playNewDisplayVideo(displayVideos[3], 1.5);
        }

        displayVideos.forEach(video => {
            video.addEventListener('ended', () => {
                playNewDisplayVideo(video, null);
                // Recalculiere zufällige Höhen wenn im Video Display
                if (isVideoMode) {
                    calculateRandomHeights();
                }
            });
        });

        // --- View Switching ---
        modeToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            isVideoMode = !isVideoMode;

            if (isVideoMode) {
                archiveView.classList.add('hidden');
                videoView.classList.remove('hidden');
                document.body.classList.add('video-mode');
                modeToggle.textContent = 'Hide Archive';

                // Pause archive videos without writing inline transform styles.
                // Inline transform: none caused the desktop hover zoom bug after returning.
                document.querySelectorAll('.image-wrapper video').forEach(v => {
                    v.pause();
                    v.muted = true;
                    v.style.removeProperty('transform');
                });

                initializeDisplayVideos();
                calculateRandomHeights();

                displayVideos.forEach(v => {
                    if (v.src) {
                        v.play().catch(() => {});
                        if (soundEnabled && !v.src.includes("hide_67.2.mp4")) v.muted = false;
                    }
                });
            } else {
                videoView.classList.add('hidden');
                archiveView.classList.remove('hidden');
                document.body.classList.remove('video-mode');
                modeToggle.textContent = 'Hide Video Display';

                // Pause display videos
                displayVideos.forEach(v => v.pause());

                // Remove any stale inline transform and let the observer resume
                // only the gallery videos that are near the viewport.
                document.querySelectorAll('.image-wrapper video').forEach(v => {
                    v.style.removeProperty('transform');
                });

                if (galleryMediaObserver) {
                    galleryMediaObserver.takeRecords();
                }
            }
        });

        // --- Sound Activation ---
        document.addEventListener('click', () => {
            if (soundEnabled) return;
            soundEnabled = true;

            // Apply to currently playing display videos if in video mode
            if (isVideoMode) {
                displayVideos.forEach(video => {
                    if (!video.src.includes("hide_67.2.mp4")) video.muted = false;
                });
            }
            // Gallery sound logic is handled in the mouseenter event now
        }, { once: true });

    </script>
</body>

</html>
