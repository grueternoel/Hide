<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Source+Code+Pro:wght@300&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --screen-width: 100vw;
            --screen-height: 100vh;
            --video-count: 3;
            --video-height: calc(var(--screen-height) / var(--video-count));
            --video-width: 100%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .video-container {
            width: 100%;
            height: var(--video-height);
            position: relative;
            background: #000;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
        }

        .nav-button {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            padding: 10px 0;
            background: transparent;
            color: #fff;
            text-decoration: none;
            font-family: 'Source Code Pro', monospace;
            font-weight: 300;
            font-size: 14px;
            letter-spacing: -0.2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            text-transform: none;
        }

        .nav-button:hover {
            transform: translateX(-50%) translateY(-2px) scale(1.05);
            opacity: 0.8;
        }

        .nav-button:active {
            transform: translateX(-50%) translateY(0) scale(0.98);
        }

        /* --- Responsive Design --- */
        /* Desktop/Laptop (1200px and above) - 3 videos stacked vertically */
        @media (min-width: 1200px) {
            body {
                display: flex;
                flex-direction: column;
                position: relative;
            }
            
            .video-container {
                width: 100%;
                height: 33.333%;
                position: relative;
                background: #000;
                overflow: hidden;
            }
        }

        /* Tablet/iPad (768px - 1199px) - 3 videos stacked vertically */
        @media (min-width: 768px) and (max-width: 1199px) {
            body {
                display: flex;
                flex-direction: column;
                position: relative;
            }
            
            .video-container {
                width: 100%;
                height: 33.333%;
                position: relative;
                background: #000;
                overflow: hidden;
            }

            .nav-button {
                font-size: 12px;
            }
        }

        /* Mobile (below 768px) - Single video, or scrollable if needed */
        @media (max-width: 767px) {
            :root {
                --video-count: 1;
            }

            body {
                display: flex;
                flex-direction: column;
                position: relative;
            }
            
            .video-container {
                width: 100%;
                height: 100%;
                position: relative;
                background: #000;
                overflow: hidden;
            }

            .video-container:nth-child(2),
            .video-container:nth-child(3) {
                display: none;
            }

            .nav-button {
                font-size: 11px;
                top: 15px;
            }
        }
    </style>
</head>

<body>

    <a href="index.html" class="nav-button">Hide Archive</a>

    <div class="video-container"><video id="video-1" playsinline></video></div>
    <div class="video-container"><video id="video-2" playsinline></video></div>
    <div class="video-container"><video id="video-3" playsinline></video></div>

    <script>
        const videoFiles = [
            "hide_12.2.mp4", "hide_16.2.mp4", "hide_19.1.mp4", "hide_27.1.mp4",
            "hide_27.2.mp4", "hide_3.2.mp4", "hide_30.2.mp4", "hide_31.1.mp4",
            "hide_37.1.mp4", "hide_39.2.mp4", "hide_4.1.mp4", "hide_40.1.mp4",
            "hide_47.1.mp4", "hide_48.1.mp4", "hide_50.1.mp4", "hide_50.2.mp4",
            "hide_51.2.mp4", "hide_52.1.mp4", "hide_55.2.mp4", "hide_58.2.mp4",
            "hide_61.2.mp4", "hide_66.1.mp4", "hide_67.2.mp4", "hide_71.2.mp4",
            "hide_74.1.mp4", "hide_78.2.mp4", "hide_79.1.mp4", "hide_80.1.mp4",
            "hide_82.2.mp4", "hide_9.1.mp4"
        ];

        const folderPath = "hide_web_videosfinal/";
        const videoElements = [
            document.getElementById('video-1'),
            document.getElementById('video-2'),
            document.getElementById('video-3')
        ];

        let soundEnabled = false;

        function getRandomVideo(excludeSrc) {
            let nextSrc;
            do {
                const index = Math.floor(Math.random() * videoFiles.length);
                nextSrc = folderPath + videoFiles[index];
            } while (nextSrc === excludeSrc && videoFiles.length > 1);
            return nextSrc;
        }

        function playNewVideo(videoElement, initialStartTime = null) {
            const nextSrc = getRandomVideo(videoElement.src);
            videoElement.src = nextSrc;

            const onMetadata = () => {
                if (initialStartTime !== null && videoElement.duration) {
                    // Start at requested time, but ensure we don't exceed duration
                    videoElement.currentTime = Math.min(initialStartTime, videoElement.duration - 0.1);
                }
                videoElement.removeEventListener('loadedmetadata', onMetadata);
            };

            videoElement.addEventListener('loadedmetadata', onMetadata);
            videoElement.load();

            videoElement.oncanplay = () => {
                const isSpecificallyMuted = nextSrc.includes("hide_67.2.mp4");
                videoElement.muted = isSpecificallyMuted || !soundEnabled;

                videoElement.play().catch(e => {
                    videoElement.muted = true;
                    videoElement.play();
                });
            };
        }

        // Initialize: use specific starting points for the first load
        playNewVideo(videoElements[0], 2.66); // Top video
        playNewVideo(videoElements[1], 0);    // Middle video
        playNewVideo(videoElements[2], 5.33); // Bottom video

        // Ensure subsequent videos play from the beginning
        videoElements.forEach(video => {
            video.addEventListener('ended', () => {
                playNewVideo(video, null); // null means start from 0
            });
        });

        // Activate sound on first click
        document.addEventListener('click', (e) => {
            // Don't activate sound if clicking the nav button
            if (e.target.classList.contains('nav-button')) return;

            soundEnabled = true;
            videoElements.forEach(video => {
                if (!video.src.includes("hide_67.2.mp4")) {
                    video.muted = false;
                }
            });
        }, { once: true });

    </script>
</body>

</html>
